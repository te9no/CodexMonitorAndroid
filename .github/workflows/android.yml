name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew app:lintDebug

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          cp app/build/outputs/apk/debug/app-debug.apk "dist/codex-monitor-android-${VERSION}.apk"
          sha256sum "dist/codex-monitor-android-${VERSION}.apk" > "dist/codex-monitor-android-${VERSION}.apk.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-android-apk
          path: dist/*

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --prerelease
