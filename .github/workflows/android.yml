name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Package version to publish, for example 0.1.0'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew app:lintDebug

      - name: Decode release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.keystore"
          fi

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          cp app/build/outputs/apk/release/app-release.apk "dist/codex-monitor-android-${VERSION}.apk"
          sha256sum "dist/codex-monitor-android-${VERSION}.apk" > "dist/codex-monitor-android-${VERSION}.apk.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-android-apk
          path: dist/*

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --prerelease
          fi

      - name: Publish APK to GitHub Packages
        if: github.ref_type == 'tag' || github.event.inputs.package_version != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ github.event.inputs.package_version != '' && github.event.inputs.package_version || github.ref_name }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          PACKAGE_VERSION="${PACKAGE_VERSION#v}"
          echo "Publishing package version ${PACKAGE_VERSION}"
          PACKAGE_VERSION="${PACKAGE_VERSION}" ./gradlew publishCodexMonitorApkPublicationToGitHubPackagesRepository

  windows-bridge:
    name: Build Windows bridge
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Build bridge EXE
        shell: pwsh
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name codex-monitor-bridge `
            --paths tools `
            tools/codex_monitor_bridge_launcher.py

      - name: Prepare bridge artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if ("${env:GITHUB_REF_TYPE}" -eq "tag") {
            $version = "${env:GITHUB_REF_NAME}"
          } else {
            $version = "${env:GITHUB_SHA}".Substring(0, 7)
          }
          Copy-Item dist\codex-monitor-bridge.exe "dist\codex-monitor-bridge-$version.exe"
          Get-FileHash "dist\codex-monitor-bridge-$version.exe" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  codex-monitor-bridge-$version.exe" } |
            Set-Content -Path "dist\codex-monitor-bridge-$version.exe.sha256" -Encoding ascii

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-windows-bridge
          path: |
            dist/codex-monitor-bridge-*.exe
            dist/codex-monitor-bridge-*.exe.sha256

      - name: Add bridge EXE to GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem -Path dist -File -Filter 'codex-monitor-bridge-*' | ForEach-Object { $_.FullName }
          gh release upload "${env:GITHUB_REF_NAME}" @files --clobber
